<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="task.css" />
    <title>Document</title>
  </head>
  <body>
    <a href="/index.html" class="task-back-page">⬅️</a>
    <div class="task-container">
      
      
      <h1>Add your tasks/goals here:</h1>
      <form action="">
        <div class="task-form" id="task">
          <label id="task-label" for="task-inp">Task(s): </label>
          <input id="task-inp"  type="text" placeholder="e.g. Toast bread in the morning"/>
        </div>
        <button id="task-btn">Add</button>
      </form>
      <div class="add-task-container">
        <h2>Your Task(s):</h2>
        <h2 id="empty-message"> No tasks yet. <br> Added tasks appears here.</h2>
        <ul class="added-task" id="added-task"></ul>
      </div>
    </div>

    <script src="task.js"></script>
  </body>
</html>
